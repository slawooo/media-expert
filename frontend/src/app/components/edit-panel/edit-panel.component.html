<div class="edit-panel-overlay" (click)="onClose()"></div>
<div class="edit-panel">
  <div class="panel-header">
    <h2>Edit Record</h2>
    <button class="btn-close" (click)="onClose()" [disabled]="saving()">
      ✕
    </button>
  </div>

  <div class="panel-content">
    @if (error()) {
      <div class="error-message">{{ error() }}</div>
    }

    <div class="form-group">
      <label for="number">Number</label>
      <input
        id="number"
        type="text"
        [(ngModel)]="editNumber"
        [disabled]="saving()"
        class="form-input"
      />
    </div>

    <div class="form-group">
      <label for="status">Status</label>
      <input
        id="status"
        type="text"
        [(ngModel)]="editStatus"
        [disabled]="saving()"
        class="form-input"
      />
    </div>

    <div class="form-group">
      <label>Created At</label>
      <div class="form-value">{{ record.createdAt | date: 'short' }}</div>
    </div>

    @if (record.statusHistory && record.statusHistory.length > 0) {
      <div class="form-group">
        <label>Status History</label>
        <div class="status-history">
          @for (entry of record.statusHistory; track entry.id) {
            <div class="history-entry">
              <span class="status-badge">{{ entry.status }}</span>
              <span class="status-date">{{ entry.createdAt | date: 'short' }}</span>
            </div>
          }
        </div>
      </div>
    }
  </div>

  <div class="panel-footer">
    <button class="btn-cancel" (click)="onClose()" [disabled]="saving()">
      Cancel
    </button>
    <button class="btn-save" (click)="onSave()" [disabled]="saving()">
      @if (saving()) {
        Saving...
      } @else {
        Save Changes
      }
    </button>
  </div>
</div>
